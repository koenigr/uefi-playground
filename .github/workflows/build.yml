name: Build HelloEfi

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run:  |
          sudo apt update
          sudo apt install -y build-essential gnu-efi

      - name: Build
        run:  make